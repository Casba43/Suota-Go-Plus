name: Build Xamarin Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14-large

    steps:
      - uses: actions/checkout@v5

      - name: Select Xamarin SDK (if available)
        run: |
          if [ -x "$VM_ASSETS/select-xamarin-sdk-v2.sh" ]; then
            "$VM_ASSETS/select-xamarin-sdk-v2.sh" --mono=6.12 --android=13.2
          fi

      - name: Verify Xamarin toolchain
        run: |
          /Library/Frameworks/Mono.framework/Versions/Current/Commands/msbuild -version
          /Library/Frameworks/Mono.framework/Versions/Current/Commands/nuget help >/dev/null
          test -f /Library/Frameworks/Xamarin.Android.framework/Versions/Current/lib/xbuild/Xamarin/Android/Xamarin.Android.CSharp.targets

      - name: Restore NuGet
        run: /Library/Frameworks/Mono.framework/Versions/Current/Commands/nuget restore Client/suota_pgp/suota_pgp.sln

      - name: Build APK
        run: /Library/Frameworks/Mono.framework/Versions/Current/Commands/msbuild Client/suota_pgp/suota_pgp/suota_pgp.Android/suota_pgp.Android.csproj /t:PackageForAndroid /p:Configuration=Debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: suota-apk
          path: Client/suota_pgp/suota_pgp/suota_pgp.Android/bin/Debug/*.apk
